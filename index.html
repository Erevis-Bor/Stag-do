<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#17130E">
<title>The Tournament</title>
<style>
  :root{
    --bg:#17130E;
    --bg-elevated:#211B14;
    --bg-card:#29221A;
    --bg-card-2:#332A20;
    --border:#3D3325;
    --text:#F4EEE1;
    --text-dim:#B6A991;
    --text-faint:#7E7260;
    --pool:#4E9B6E;
    --pool-soft:#28352B;
    --tt:#DC6A32;
    --tt-soft:#3B2C20;
    --cornhole:#CFA355;
    --cornhole-soft:#3A3220;
    --gold:#D9B24C;
    --danger:#C1503F;
    --danger-soft:#3B2420;
    --radius:16px;
    --radius-sm:10px;
    --font-display:"Futura","Avenir Next",-apple-system,"Helvetica Neue",sans-serif;
    --font-body:-apple-system,"SF Pro Text",system-ui,sans-serif;
    --font-mono:"SF Mono","Menlo",ui-monospace,monospace;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);}
  body{
    font-family:var(--font-body);
    min-height:100vh;
    min-height:100dvh;
    overscroll-behavior-y:none;
  }
  button, input{font-family:inherit; color:inherit;}
  button{touch-action:manipulation;}
  #app{min-height:100vh; min-height:100dvh; display:flex; flex-direction:column;}

  /* ---------- SETUP SCREEN ---------- */
  .setup{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:32px 20px;
    min-height:100vh;
    min-height:100dvh;
  }
  .setup-inner{width:100%; max-width:420px;}
  .eyebrow{
    font-family:var(--font-mono);
    font-size:12px;
    letter-spacing:0.18em;
    color:var(--cornhole);
    text-transform:uppercase;
    margin-bottom:6px;
  }
  .wordmark{
    font-family:var(--font-display);
    font-weight:700;
    font-size:44px;
    letter-spacing:0.02em;
    margin:0 0 6px 0;
    line-height:1.02;
  }
  .subtitle{
    color:var(--text-dim);
    font-size:15px;
    margin-bottom:28px;
  }
  .setup-copy{
    font-size:15px;
    color:var(--text-dim);
    margin:0 0 10px 0;
  }
  .names-input{
    width:100%;
    background:var(--bg-elevated);
    border:1px solid var(--border);
    border-radius:var(--radius);
    color:var(--text);
    padding:14px 16px;
    font-size:16px;
    line-height:1.6;
    resize:vertical;
    min-height:220px;
  }
  .names-input:focus{outline:2px solid var(--cornhole); outline-offset:2px;}
  .names-count{
    font-family:var(--font-mono);
    font-size:13px;
    color:var(--text-faint);
    margin:10px 2px 22px 2px;
  }
  .names-error{
    color:var(--danger);
    font-size:13px;
    margin:-14px 2px 16px 2px;
    min-height:16px;
  }
  .btn{
    font-family:var(--font-body);
    font-weight:600;
    font-size:16px;
    border:none;
    border-radius:var(--radius-sm);
    padding:15px 20px;
    cursor:pointer;
  }
  .btn:active{transform:scale(0.98);}
  .btn-block{width:100%; display:block;}
  .btn-primary{background:var(--cornhole); color:#1A1610;}
  .btn-ghost{background:transparent; color:var(--text-dim); border:1px solid var(--border);}
  .setup-hint{
    font-size:13px;
    color:var(--text-faint);
    line-height:1.5;
    margin-top:16px;
  }

  /* ---------- SHELL ---------- */
  .topbar{
    position:sticky; top:0; z-index:5;
    background:rgba(23,19,14,0.92);
    backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px);
    border-bottom:1px solid var(--border);
    padding:16px 20px 14px 20px;
  }
  .topbar-title{
    font-family:var(--font-display);
    font-weight:700;
    font-size:22px;
    letter-spacing:0.01em;
  }
  .content{
    flex:1;
    padding:16px 16px 24px 16px;
    padding-bottom:calc(24px + 78px + env(safe-area-inset-bottom));
  }
  .tabbar{
    position:fixed; left:0; right:0; bottom:0; z-index:5;
    display:flex;
    background:rgba(23,19,14,0.96);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    border-top:1px solid var(--border);
    padding:8px 6px calc(8px + env(safe-area-inset-bottom)) 6px;
  }
  .tab-btn{
    flex:1;
    display:flex; flex-direction:column; align-items:center; gap:5px;
    background:transparent; border:none;
    color:var(--text-faint);
    font-size:11px;
    font-weight:600;
    padding:6px 2px;
    border-radius:10px;
  }
  .tab-btn.active{color:var(--text);}
  .tab-dot{width:8px; height:8px; border-radius:50%; background:var(--dot); opacity:0.45;}
  .tab-btn.active .tab-dot{opacity:1;}

  /* ---------- SECTIONS / LABELS ---------- */
  .section-label{
    font-family:var(--font-mono);
    font-size:12px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--text-faint);
    margin:22px 4px 10px 4px;
  }
  .section-label:first-child{margin-top:4px;}

  /* ---------- MATCH CARDS ---------- */
  .match-card{
    width:100%;
    display:flex; flex-direction:column; align-items:flex-start; gap:6px;
    background:var(--bg-card);
    border:1px solid var(--border);
    border-left:3px solid var(--accent, var(--gold));
    border-radius:var(--radius-sm);
    padding:14px 16px;
    margin-bottom:10px;
    text-align:left;
  }
  .match-card:active{background:var(--bg-card-2);}
  .match-card-featured{border-left-width:4px;}
  .match-players{font-size:16px; font-weight:600;}
  .vs{color:var(--text-faint); font-weight:400; font-size:13px; margin:0 4px;}
  .match-cta{font-size:12px; color:var(--text-faint);}
  .tag-chip{
    font-family:var(--font-mono);
    font-size:10px;
    letter-spacing:0.1em;
    padding:3px 7px;
    border-radius:5px;
    font-weight:700;
  }
  .tag-final{background:var(--gold); color:#1A1610;}
  .tag-third{background:var(--bg-card-2); color:var(--text-dim);}

  .bye-card{
    display:flex; align-items:center; justify-content:space-between;
    background:transparent;
    border:1px dashed var(--border);
    border-radius:var(--radius-sm);
    padding:12px 16px;
    margin-bottom:10px;
    color:var(--text-faint);
    font-size:14px;
  }
  .bye-tag{font-size:12px; font-style:italic;}

  /* ---------- HISTORY ---------- */
  .history-round{margin-bottom:4px;}
  .history-round-label{
    font-size:11px;
    color:var(--text-faint);
    text-transform:uppercase;
    letter-spacing:0.08em;
    margin:16px 4px 6px 4px;
  }
  .history-row{
    width:100%;
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    background:transparent;
    border:none;
    border-bottom:1px solid var(--border);
    padding:10px 4px;
    text-align:left;
    font-size:14px;
    color:var(--text-dim);
  }
  .history-row strong{color:var(--text); font-weight:600;}
  .history-score{font-family:var(--font-mono); font-size:13px; color:var(--text-faint); flex-shrink:0;}

  /* ---------- STANDINGS ---------- */
  .standings{margin-top:22px;}
  .standings-title{
    font-family:var(--font-display);
    font-weight:700;
    font-size:20px;
    margin-bottom:12px;
  }
  .standings-row{
    display:flex; align-items:baseline; gap:12px;
    padding:10px 4px;
    border-bottom:1px solid var(--border);
  }
  .standings-row.tied{background:var(--bg-card); border-radius:var(--radius-sm); border-bottom:none; padding:10px 12px; margin-bottom:6px;}
  .standings-rank{
    font-family:var(--font-display);
    font-weight:700;
    font-size:20px;
    width:56px;
    flex-shrink:0;
    color:var(--gold);
  }
  .standings-name{flex:1; font-size:15px;}
  .standings-points{font-family:var(--font-mono); font-size:13px; color:var(--text-dim); flex-shrink:0;}
  .standings-note{font-size:12px; color:var(--text-faint); margin-top:14px; line-height:1.5;}

  /* ---------- OVERVIEW ---------- */
  .upnext-game{
    display:flex; align-items:center; justify-content:space-between;
    margin:18px 4px 8px 4px;
  }
  .upnext-game-label{
    font-weight:700; font-size:15px;
    border-left:3px solid var(--accent);
    padding-left:8px;
  }
  .upnext-more{font-size:12px; color:var(--text-faint); margin:2px 4px 4px 4px;}
  .badge{
    font-family:var(--font-mono);
    font-size:10px;
    letter-spacing:0.08em;
    padding:4px 8px;
    border-radius:6px;
    text-transform:uppercase;
    font-weight:700;
  }
  .badge-done{background:var(--pool-soft); color:var(--pool);}

  .leaderboard{margin-top:24px;}
  .lb-legend{
    display:flex; justify-content:flex-end; gap:10px;
    font-family:var(--font-mono); font-size:10px; color:var(--text-faint);
    padding:0 4px 8px 4px;
  }
  .lb-row{
    display:flex; align-items:center; gap:10px;
    padding:12px 4px;
    border-bottom:1px solid var(--border);
  }
  .lb-rank{
    font-family:var(--font-display);
    font-weight:700; font-size:18px;
    width:26px; flex-shrink:0;
    color:var(--text-dim);
  }
  .lb-row:nth-child(1) .lb-rank, .lb-row.first .lb-rank{color:var(--gold);}
  .lb-name{flex:1; font-size:15px; font-weight:600; min-width:0; overflow-wrap:anywhere;}
  .lb-breakdown{font-family:var(--font-mono); font-size:12px; color:var(--text-faint); flex-shrink:0;}
  .lb-total{font-family:var(--font-mono); font-size:16px; font-weight:700; width:34px; text-align:right; flex-shrink:0;}
  .lb-empty{color:var(--text-faint); font-size:14px; padding:12px 4px;}

  .reset-zone{margin-top:36px; padding-top:16px; border-top:1px solid var(--border); text-align:center;}
  .reset-btn{background:transparent; border:none; color:var(--text-faint); font-size:13px; padding:10px;}
  .reset-btn.armed{color:var(--danger); font-weight:700;}

  /* ---------- OVERLAY ---------- */
  .overlay-backdrop{
    position:fixed; inset:0; z-index:20;
    background:rgba(10,8,5,0.6);
    display:flex; align-items:flex-end;
  }
  .overlay-sheet{
    width:100%;
    background:var(--bg-elevated);
    border-top:1px solid var(--border);
    border-radius:20px 20px 0 0;
    padding:20px 20px calc(24px + env(safe-area-inset-bottom)) 20px;
    position:relative;
    animation:slideUp 0.22s ease-out;
  }
  @keyframes slideUp{from{transform:translateY(24px); opacity:0;} to{transform:translateY(0); opacity:1;}}
  .overlay-close{
    position:absolute; top:14px; right:16px;
    background:var(--bg-card); border:none; color:var(--text-dim);
    width:32px; height:32px; border-radius:50%;
    font-size:15px;
  }
  .overlay-title{font-family:var(--font-display); font-weight:700; font-size:19px; margin:4px 40px 18px 0;}
  .overlay-players{display:flex; flex-direction:column; gap:10px;}
  .pick-btn{
    background:var(--bg-card);
    border:1.5px solid var(--border);
    border-radius:var(--radius-sm);
    padding:16px;
    font-size:17px;
    font-weight:600;
    text-align:left;
  }
  .pick-btn:active{background:var(--bg-card-2);}
  .pick-btn.picked{border-color:var(--gold); color:var(--gold);}
  .field-label{display:block; font-size:13px; color:var(--text-dim); margin-bottom:6px;}
  .score-input{
    width:100%;
    background:var(--bg-card);
    border:1px solid var(--border);
    border-radius:var(--radius-sm);
    padding:14px;
    font-size:18px;
    font-family:var(--font-mono);
    margin-bottom:14px;
  }
  .score-input:focus{outline:2px solid var(--cornhole); outline-offset:1px;}
  .score-fields{display:flex; gap:12px;}
  .score-fields > div{flex:1;}
  .overlay-error{color:var(--danger); font-size:13px; min-height:16px; margin:-6px 0 10px 0;}
  .overlay-actions{display:flex; gap:10px; margin-top:4px;}
  .overlay-actions .btn-ghost{flex:0 0 auto;}
  .overlay-actions .btn-primary{flex:1;}

  .game-header{display:flex; align-items:center; justify-content:space-between; margin-bottom:4px;}
  .game-header h2{font-family:var(--font-display); font-size:20px; margin:0; font-weight:700;}
  .progress-note{font-size:12px; color:var(--text-faint); margin:0 4px 14px 4px;}
</style>
</head>
<body>
<div id="app"></div>
<script>
(function(){
  "use strict";

  /* ============ GAME CONFIG ============ */
  var GAMES = [
    { key:'pool',     label:'Pool',          metric:'balls', color:'var(--pool)' },
    { key:'tt',       label:'Table Tennis',  metric:'score', color:'var(--tt)' },
    { key:'cornhole', label:'Cornhole',      metric:'score', color:'var(--cornhole)' }
  ];
  function gameByKey(k){ return GAMES.filter(function(g){return g.key===k;})[0]; }

  /* ============ STATE ============ */
  var state = { setupDone:false, playerNames:[], tournaments:null, view:'overview', overlay:null, resetArmed:false };

  /* ============ STORAGE ============ */
  // Tries plain browser storage first (what actually persists when this file is
  // opened standalone in Safari), and also writes to window.storage in case this
  // is being viewed inside Claude itself. Either way, nothing crashes if one of
  // the two isn't available.
  function saveState(){
    var json = JSON.stringify(state);
    try{ localStorage.setItem('stag-tournament-v1', json); }catch(e){}
    try{
      if (window.storage && window.storage.set){
        window.storage.set('stag-tournament-v1', json, false);
      }
    }catch(e){}
  }
  function loadState(){
    return new Promise(function(resolve){
      var fromLocal = null;
      try{
        var raw = localStorage.getItem('stag-tournament-v1');
        if (raw) fromLocal = JSON.parse(raw);
      }catch(e){}
      try{
        if (window.storage && window.storage.get){
          window.storage.get('stag-tournament-v1', false).then(function(res){
            if (res && res.value){
              try{ resolve(JSON.parse(res.value)); return; }catch(e){}
            }
            resolve(fromLocal);
          }).catch(function(){ resolve(fromLocal); });
          return;
        }
      }catch(e){}
      resolve(fromLocal);
    });
  }

  /* ============ BRACKET LOGIC ============ */
  // TODO: Current implementation still uses automatic byes.
  // The UI text has been updated for the Joker Rule, but the tournament
  // generation logic must be rewritten to implement it.
  function shuffle(arr){
    var a = arr.slice();
    for (var i=a.length-1; i>0; i--){
      var j = Math.floor(Math.random()*(i+1));
      var tmp=a[i]; a[i]=a[j]; a[j]=tmp;
    }
    return a;
  }
  function nextPow2(n){ var p=1; while(p<n) p*=2; return p; }
  function makeMatch(a,b){ return { a:a, b:b, winner:null, loser:null, scoreWinner:null, scoreLoser:null, margin:null }; }

  function createTournament(players){
    var shuffled = shuffle(players);
    var n = shuffled.length;
    var bracketSize = nextPow2(n);
    var byeCount = bracketSize - n;
    var byePlayers = shuffled.slice(0, byeCount);
    var playing = shuffled.slice(byeCount);
    var round0 = [];
    for (var i=0; i<playing.length; i+=2){
      round0.push(makeMatch(playing[i], playing[i+1]));
    }
    return { n:n, bracketSize:bracketSize, byePlayers:byePlayers, rounds:[round0], thirdPlace:null, complete:false };
  }

  function roundComplete(round){
    return round.every(function(m){ return m.winner!==null; });
  }

  function advance(t){
    var lastIdx = t.rounds.length-1;
    var lastRound = t.rounds[lastIdx];
    if (!roundComplete(lastRound)) return;
    var pool = lastRound.map(function(m){ return m.winner; });
    if (lastIdx===0) pool = pool.concat(t.byePlayers);
    if (pool.length<=1) return;
    var nextRound = [];
    for (var i=0;i<pool.length;i+=2){
      nextRound.push(makeMatch(pool[i], pool[i+1]));
    }
    t.rounds.push(nextRound);
  }

  function afterRoundMaybeComplete(t, roundIndex){
    var round = t.rounds[roundIndex];
    if (!roundComplete(round)) return;
    var beforeLen = t.rounds.length;
    advance(t);
    var afterLen = t.rounds.length;
    if (afterLen>beforeLen){
      var newRound = t.rounds[afterLen-1];
      if (newRound.length===1 && !t.thirdPlace && round.length===2){
        var losers = round.map(function(m){ return m.loser; });
        t.thirdPlace = { a:losers[0], b:losers[1], winner:null, loser:null, scoreWinner:null, scoreLoser:null, margin:null };
      }
    }
  }

  function checkComplete(t){
    var finalRound = t.rounds[t.rounds.length-1];
    var finalDone = finalRound.length===1 && finalRound[0].winner!==null;
    var thirdDone = !t.thirdPlace || t.thirdPlace.winner!==null;
    t.complete = !!(finalDone && thirdDone);
  }

  function applyResult(t, roundIndex, matchIndex, winner, scoreWinner, scoreLoser){
    var isThird = roundIndex==='third';
    var match = isThird ? t.thirdPlace : t.rounds[roundIndex][matchIndex];
    var oldWinner = match.winner;
    match.winner = winner;
    match.loser = (winner===match.a) ? match.b : match.a;
    match.scoreWinner = scoreWinner;
    match.scoreLoser = scoreLoser;
    match.margin = (scoreWinner===null) ? scoreLoser : Math.abs(scoreWinner-scoreLoser);
    var truncated = false;
    if (!isThird){
      if (oldWinner!==null && oldWinner!==winner && roundIndex < t.rounds.length-1){
        t.rounds = t.rounds.slice(0, roundIndex+1);
        t.thirdPlace = null;
        truncated = true;
      }
      afterRoundMaybeComplete(t, roundIndex);
    }
    checkComplete(t);
    return truncated;
  }

  function computeStandings(t){
    var n = t.n;
    var R = t.rounds.length;
    var results = [];
    var finalMatch = t.rounds[R-1][0];
    results.push({ name:finalMatch.winner, rank:1 });
    results.push({ name:finalMatch.loser, rank:2 });
    if (t.thirdPlace){
      results.push({ name:t.thirdPlace.winner, rank:3 });
      results.push({ name:t.thirdPlace.loser, rank:4 });
    }
    var nextRank = t.thirdPlace ? 5 : 3;
    var bandTop = t.thirdPlace ? R-3 : R-2;
    for (var r=bandTop; r>=0; r--){
      var round = t.rounds[r];
      var losers = round.filter(function(m){ return m.winner!==null; })
                         .map(function(m){ return { name:m.loser, margin:m.margin }; });
      if (losers.length===0) continue;
      losers.sort(function(a,b){ return a.margin-b.margin; });
      var i=0;
      while (i<losers.length){
        var j=i;
        while (j+1<losers.length && losers[j+1].margin===losers[i].margin) j++;
        var tieCount = j-i+1;
        var rankStart = nextRank, rankEnd = nextRank+tieCount-1;
        var avgRank = (rankStart+rankEnd)/2;
        for (var k=i;k<=j;k++) results.push({ name:losers[k].name, rank:avgRank });
        nextRank = rankEnd+1;
        i=j+1;
      }
    }
    results.forEach(function(res){ res.points = Math.round((n-res.rank+1)*10)/10; });
    results.sort(function(a,b){ return a.rank-b.rank; });
    return results;
  }

  function getPendingMatches(t){
    var list = [];
    var lastIdx = t.rounds.length-1;
    var isFinalRound = t.rounds[lastIdx].length===1;
    t.rounds[lastIdx].forEach(function(m,i){
      if (m.winner===null) list.push({ roundIndex:lastIdx, matchIndex:i, a:m.a, b:m.b, tag:isFinalRound?'final':null });
    });
    if (t.thirdPlace && t.thirdPlace.winner===null){
      list.push({ roundIndex:'third', matchIndex:null, a:t.thirdPlace.a, b:t.thirdPlace.b, tag:'third' });
    }
    return list;
  }

  function roundLabel(poolSize){
    if (poolSize===2) return 'Final';
    if (poolSize===4) return 'Semi-Finals';
    if (poolSize===8) return 'Quarter-Finals';
    if (poolSize===16) return 'Round of 16';
    if (poolSize===32) return 'Round of 32';
    return 'Round of '+poolSize;
  }
  function currentRoundLabel(t){
    var idx = t.rounds.length-1;
    return roundLabel(t.bracketSize/Math.pow(2,idx));
  }
  function getOrdinal(n){
    var s=["th","st","nd","rd"], v=n%100;
    return n+(s[(v-20)%10]||s[v]||s[0]);
  }

  /* ============ HELPERS ============ */
  function escapeHtml(str){
    return String(str).replace(/[&<>"']/g, function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }

  /* ============ RENDER: SETUP ============ */
  function renderSetup(){
    return '' +
      '<div class="setup"><div class="setup-inner">' +
        '<div class="eyebrow">THE STAG DO</div>' +
        '<h1 class="wordmark">TOURNAMENT</h1>' +
        '<div class="subtitle">Pool &middot; Table Tennis &middot; Cornhole</div>' +
        '<p class="setup-copy">Enter everyone playing, one name per line.</p>' +
        '<textarea id="namesInput" class="names-input" rows="10" placeholder="Dave&#10;Ollie&#10;Sam&#10;Jack"></textarea>' +
        '<div class="names-count" id="namesCount">0 players</div>' +
        '<div class="names-error" id="namesError"></div>' +
        '<button class="btn btn-primary btn-block" data-action="generate">Generate Brackets</button>' +
        '<p class="setup-hint">Each game gets its own random draw, so the matchups differ across pool, table tennis and cornhole. Byes are handled automatically if the numbers don\'t divide evenly. Minimum 4 players.</p>' +
      '</div></div>';
  }

  /* ============ RENDER: SHELL ============ */
  function renderHeader(){
    var titles = { overview:'Leaderboard', pool:'Pool', tt:'Table Tennis', cornhole:'Cornhole' };
    return '<div class="topbar"><span class="topbar-title">'+titles[state.view]+'</span></div>';
  }

  function dotColor(key){
    if (key==='pool') return 'var(--pool)';
    if (key==='tt') return 'var(--tt)';
    if (key==='cornhole') return 'var(--cornhole)';
    return 'var(--gold)';
  }

  function renderTabBar(){
    var tabs = [
      { key:'overview', label:'Overview' },
      { key:'pool', label:'Pool' },
      { key:'tt', label:'Table Tennis' },
      { key:'cornhole', label:'Cornhole' }
    ];
    var html = '<nav class="tabbar">';
    tabs.forEach(function(tb){
      html += '<button class="tab-btn'+(state.view===tb.key?' active':'')+'" data-action="switch-tab" data-tab="'+tb.key+'">' +
                '<span class="tab-dot" style="--dot:'+dotColor(tb.key)+'"></span>' + tb.label +
              '</button>';
    });
    html += '</nav>';
    return html;
  }

  function matchCard(gameKey, m){
    var roundAttr = m.roundIndex==='third' ? 'third' : m.roundIndex;
    var matchAttr = (m.matchIndex===null || m.matchIndex===undefined) ? '' : m.matchIndex;
    var tagChip = '';
    if (m.tag==='final') tagChip = '<span class="tag-chip tag-final">FINAL</span>';
    else if (m.tag==='third') tagChip = '<span class="tag-chip tag-third">3RD PLACE</span>';
    return '<button class="match-card'+(m.tag?' match-card-featured':'')+'" style="--accent:'+m.accent+'" data-action="open-match" data-game="'+gameKey+'" data-round="'+roundAttr+'" data-match="'+matchAttr+'">' +
      tagChip +
      '<span class="match-players">'+escapeHtml(m.a)+' <span class="vs">vs</span> '+escapeHtml(m.b)+'</span>' +
      '<span class="match-cta">Enter result &rarr;</span>' +
    '</button>';
  }

  function renderOverviewUpNext(){
    var html = '<div class="section-label">Up Next</div>';
    GAMES.forEach(function(g){
      var t = state.tournaments[g.key];
      if (t.complete){
        html += '<div class="upnext-game" style="--accent:'+g.color+'"><span class="upnext-game-label">'+g.label+'</span><span class="badge badge-done">Done</span></div>';
        return;
      }
      html += '<div class="upnext-game" style="--accent:'+g.color+'"><span class="upnext-game-label">'+g.label+'</span><span class="progress-note" style="margin:0;">'+currentRoundLabel(t)+'</span></div>';
      var pending = getPendingMatches(t);
      pending.slice(0,3).forEach(function(m){
        m.accent = g.color;
        html += matchCard(g.key, m);
      });
      if (pending.length>3){
        html += '<div class="upnext-more">+'+(pending.length-3)+' more on the '+g.label+' tab</div>';
      }
    });
    return html;
  }

  function renderOverviewLeaderboard(){
    var anyComplete = GAMES.some(function(g){ return state.tournaments[g.key].complete; });
    var html = '<div class="leaderboard"><div class="section-label" style="margin-top:8px;">Leaderboard</div>';
    if (!anyComplete){
      html += '<div class="lb-empty">Points land here once a game\'s bracket is finished. Get playing!</div></div>';
      return html;
    }
    html += '<div class="lb-legend">P &nbsp;/&nbsp; TT &nbsp;/&nbsp; CH</div>';
    var rows = state.playerNames.map(function(name){
      var perGame = {}, total = 0;
      GAMES.forEach(function(g){
        var t = state.tournaments[g.key];
        if (t.complete){
          var standings = computeStandings(t);
          var entry = standings.filter(function(s){ return s.name===name; })[0];
          perGame[g.key] = entry ? entry.points : 0;
          total += perGame[g.key];
        } else {
          perGame[g.key] = null;
        }
      });
      return { name:name, perGame:perGame, total:total };
    });
    rows.sort(function(a,b){ return b.total-a.total; });
    var rank=0, lastTotal=null, seen=0;
    rows.forEach(function(r){
      seen++;
      if (r.total!==lastTotal){ rank=seen; lastTotal=r.total; }
      var breakdown = GAMES.map(function(g){ return r.perGame[g.key]===null ? '&ndash;' : r.perGame[g.key]; }).join(' / ');
      html += '<div class="lb-row'+(rank===1?' first':'')+'">' +
        '<span class="lb-rank">'+rank+'</span>' +
        '<span class="lb-name">'+escapeHtml(r.name)+'</span>' +
        '<span class="lb-breakdown">'+breakdown+'</span>' +
        '<span class="lb-total">'+(Math.round(r.total*10)/10)+'</span>' +
      '</div>';
    });
    html += '</div>';
    return html;
  }

  function renderResetControl(){
    if (state.resetArmed){
      return '<div class="reset-zone"><button class="reset-btn armed" data-action="reset-confirm">Tap again to confirm reset</button></div>';
    }
    return '<div class="reset-zone"><button class="reset-btn" data-action="reset-tap">Reset Tournament</button></div>';
  }

  function renderHistory(gameKey, t){
    var g = gameByKey(gameKey);
    var html = '';
    t.rounds.forEach(function(round, rIdx){
      var doneMatches = [];
      round.forEach(function(m, idx){ if (m.winner!==null) doneMatches.push({m:m, idx:idx}); });
      if (doneMatches.length===0) return;
      html += '<div class="history-round"><div class="history-round-label">'+roundLabel(t.bracketSize/Math.pow(2,rIdx))+'</div>';
      doneMatches.forEach(function(item){
        html += historyRow(gameKey, rIdx, item.idx, item.m, g.metric);
      });
      html += '</div>';
    });
    if (t.thirdPlace && t.thirdPlace.winner!==null){
      html += '<div class="history-round"><div class="history-round-label">3rd Place Playoff</div>' +
        historyRow(gameKey, 'third', '', t.thirdPlace, g.metric) +
      '</div>';
    }
    return html;
  }

  function historyRow(gameKey, roundIndex, matchIndex, m, metric){
    var resultText = metric==='balls' ? (m.scoreLoser+' left') : (m.scoreWinner+'&ndash;'+m.scoreLoser);
    return '<button class="history-row" data-action="open-match" data-game="'+gameKey+'" data-round="'+roundIndex+'" data-match="'+matchIndex+'">' +
      '<span><strong>'+escapeHtml(m.winner)+'</strong> beat '+escapeHtml(m.loser)+'</span>' +
      '<span class="history-score">'+resultText+'</span>' +
    '</button>';
  }

  function rangeLabel(rank, count){
    var start = rank-(count-1)/2, end = rank+(count-1)/2;
    return getOrdinal(start)+'&ndash;'+getOrdinal(end);
  }

  function renderFinalStandings(t){
    var standings = computeStandings(t);
    var groups = [];
    standings.forEach(function(s){
      var last = groups[groups.length-1];
      if (last && last.rank===s.rank) last.names.push(s.name);
      else groups.push({ rank:s.rank, points:s.points, names:[s.name] });
    });
    var html = '<div class="standings"><div class="standings-title">Final Standings</div>';
    groups.forEach(function(grp){
      var tied = grp.names.length>1;
      html += '<div class="standings-row'+(tied?' tied':'')+'">' +
        '<span class="standings-rank">'+(tied?rangeLabel(grp.rank,grp.names.length):getOrdinal(grp.rank))+'</span>' +
        '<span class="standings-name">'+grp.names.map(escapeHtml).join(', ')+'</span>' +
        '<span class="standings-points">'+grp.points+' pts'+(tied?' each':'')+'</span>' +
      '</div>';
    });
    html += '<p class="standings-note">Players out in the same round are ranked by how close that match was &mdash; smaller gap to the winner ranks higher. Identical margins split the points evenly.<br><br><strong>Joker Rule (odd number of players):</strong> One player is randomly selected as the Joker and sits out the first round. After the opening round, the closest first-round loser (smallest losing margin, or fewest balls remaining in Pool) plays the Joker for the final place in Round 2. If multiple players have the same closest margin, choose randomly or play a one-point playoff.</p>';
    html += '</div>';
    return html;
  }

  function renderGameTab(gameKey){
    var g = gameByKey(gameKey);
    var t = state.tournaments[gameKey];
    var html = '<div class="game-header"><h2>'+g.label+'</h2>' + (t.complete ? '<span class="badge badge-done">Complete</span>' : '') + '</div>';

    if (!t.complete){
      html += '<p class="progress-note">'+currentRoundLabel(t)+'</p>';
      var pending = getPendingMatches(t);
      if (pending.length){
        html += '<div class="section-label">To Play</div>';
        pending.forEach(function(m){ m.accent = g.color; html += matchCard(gameKey, m); });
      }
      if (t.rounds.length===1 && t.byePlayers.length){
        t.byePlayers.forEach(function(name){
          html += '<div class="bye-card"><span>'+escapeHtml(name)+'</span><span class="bye-tag">Bye, through to next round</span></div>';
        });
      }
    }

    var history = renderHistory(gameKey, t);
    if (history) html += history;

    if (t.complete) html += renderFinalStandings(t);

    return html;
  }

  /* ============ RENDER: OVERLAY ============ */
  function renderOverlay(){
    var o = state.overlay;
    if (!o) return '';
    var g = gameByKey(o.game);
    var inner;
    if (o.step==='pick'){
      inner = '<div class="overlay-title">Who won?</div>' +
        '<div class="overlay-players">' +
          '<button class="pick-btn'+(o.winner===o.a?' picked':'')+'" data-action="pick-winner" data-side="a">'+escapeHtml(o.a)+'</button>' +
          '<button class="pick-btn'+(o.winner===o.b?' picked':'')+'" data-action="pick-winner" data-side="b">'+escapeHtml(o.b)+'</button>' +
        '</div>';
    } else {
      var loser = o.winner===o.a ? o.b : o.a;
      if (g.metric==='balls'){
        inner = '<div class="overlay-title">'+escapeHtml(o.winner)+' beat '+escapeHtml(loser)+'</div>' +
          '<label class="field-label" for="inputBalls">Balls '+escapeHtml(loser)+' had left on the table</label>' +
          '<input id="inputBalls" type="number" inputmode="numeric" min="0" max="15" class="score-input" value="'+(o.prefillLoser!==null&&o.prefillLoser!==undefined?o.prefillLoser:'')+'" placeholder="0">' +
          '<div class="overlay-error" id="overlayError"></div>' +
          '<div class="overlay-actions"><button class="btn btn-ghost" data-action="back-to-pick">Back</button><button class="btn btn-primary" data-action="save-score">Save Result</button></div>';
      } else {
        inner = '<div class="overlay-title">'+escapeHtml(o.winner)+' beat '+escapeHtml(loser)+'</div>' +
          '<div class="score-fields">' +
            '<div><label class="field-label" for="inputWinnerScore">'+escapeHtml(o.winner)+'</label>' +
            '<input id="inputWinnerScore" type="number" inputmode="numeric" min="0" class="score-input" value="'+(o.prefillWinner!==null&&o.prefillWinner!==undefined?o.prefillWinner:'')+'" placeholder="11"></div>' +
            '<div><label class="field-label" for="inputLoserScore">'+escapeHtml(loser)+'</label>' +
            '<input id="inputLoserScore" type="number" inputmode="numeric" min="0" class="score-input" value="'+(o.prefillLoser!==null&&o.prefillLoser!==undefined?o.prefillLoser:'')+'" placeholder="7"></div>' +
          '</div>' +
          '<div class="overlay-error" id="overlayError"></div>' +
          '<div class="overlay-actions"><button class="btn btn-ghost" data-action="back-to-pick">Back</button><button class="btn btn-primary" data-action="save-score">Save Result</button></div>';
      }
    }
    return '<div class="overlay-backdrop"><div class="overlay-sheet">' +
      '<button class="overlay-close" data-action="close-overlay">&#10005;</button>' + inner +
    '</div></div>';
  }

  /* ============ MAIN RENDER ============ */
  function render(){
    var app = document.getElementById('app');
    if (!state.setupDone){
      app.innerHTML = renderSetup();
      var input = document.getElementById('namesInput');
      if (input) input.addEventListener('input', updateNamesCount);
      return;
    }
    var html = renderHeader() + '<div class="content">';
    if (state.view==='overview'){
      html += renderOverviewUpNext() + renderOverviewLeaderboard() + renderResetControl();
    } else {
      html += renderGameTab(state.view);
    }
    html += '</div>' + renderTabBar() + renderOverlay();
    app.innerHTML = html;
  }

  function updateNamesCount(){
    var val = document.getElementById('namesInput').value;
    var count = val.split('\n').map(function(s){return s.trim();}).filter(Boolean).length;
    var el = document.getElementById('namesCount');
    if (el) el.textContent = count+' player'+(count===1?'':'s');
  }

  /* ============ ACTIONS ============ */
  function doGenerate(){
    var raw = document.getElementById('namesInput').value;
    var names = raw.split('\n').map(function(s){return s.trim();}).filter(Boolean);
    if (names.length<4){
      var err = document.getElementById('namesError');
      if (err) err.textContent = 'Add at least 4 players.';
      return;
    }
    var seen = {};
    names = names.map(function(name){
      if (seen[name]===undefined){ seen[name]=1; return name; }
      seen[name]++;
      return name+' ('+seen[name]+')';
    });
    state.playerNames = names;
    state.tournaments = {};
    GAMES.forEach(function(g){ state.tournaments[g.key] = createTournament(names); });
    state.setupDone = true;
    state.view = 'overview';
    render();
    saveState();
  }

  function openMatch(gameKey, roundIndexRaw, matchIndexRaw){
    var t = state.tournaments[gameKey];
    var isThird = roundIndexRaw==='third';
    var roundIndex = isThird ? 'third' : parseInt(roundIndexRaw,10);
    var matchIndex = isThird ? null : parseInt(matchIndexRaw,10);
    var m = isThird ? t.thirdPlace : t.rounds[roundIndex][matchIndex];
    state.overlay = {
      game:gameKey, roundIndex:roundIndex, matchIndex:matchIndex,
      a:m.a, b:m.b, step:'pick', winner:m.winner,
      prefillWinner:m.scoreWinner, prefillLoser:m.scoreLoser
    };
    render();
  }

  function pickWinner(side){
    var o = state.overlay;
    o.winner = side==='a' ? o.a : o.b;
    o.step = 'score';
    render();
    setTimeout(function(){
      var el = document.getElementById('inputWinnerScore') || document.getElementById('inputBalls');
      if (el) el.focus();
    }, 60);
  }

  function doSaveScore(){
    var o = state.overlay;
    var g = gameByKey(o.game);
    var errorEl = document.getElementById('overlayError');
    var scoreWinner, scoreLoser;
    if (g.metric==='balls'){
      var val = document.getElementById('inputBalls').value;
      if (val===''||isNaN(val)||Number(val)<0){ errorEl.textContent='Enter how many balls were left (0 or more).'; return; }
      scoreLoser = Number(val);
      scoreWinner = null;
    } else {
      var wv = document.getElementById('inputWinnerScore').value;
      var lv = document.getElementById('inputLoserScore').value;
      if (wv===''||lv===''||isNaN(wv)||isNaN(lv)){ errorEl.textContent='Enter both scores.'; return; }
      scoreWinner = Number(wv); scoreLoser = Number(lv);
      if (scoreWinner<=scoreLoser){ errorEl.textContent = o.winner+'\'s score should be higher.'; return; }
    }
    var truncated = applyResult(state.tournaments[o.game], o.roundIndex, o.matchIndex, o.winner, scoreWinner, scoreLoser);
    state.overlay = null;
    render();
    saveState();
    if (truncated){
      setTimeout(function(){ alert('Later rounds in this game were reset because this result changed. Re-enter them when ready.'); }, 100);
    }
  }

  function doReset(){
    state = { setupDone:false, playerNames:[], tournaments:null, view:'overview', overlay:null, resetArmed:false };
    render();
    saveState();
  }

  /* ============ EVENT DELEGATION ============ */
  document.body.addEventListener('click', function(e){
    var el = e.target.closest('[data-action]');
    if (!el) return;
    var action = el.getAttribute('data-action');
    if (action==='generate') doGenerate();
    else if (action==='switch-tab'){ state.view = el.getAttribute('data-tab'); render(); }
    else if (action==='open-match') openMatch(el.getAttribute('data-game'), el.getAttribute('data-round'), el.getAttribute('data-match'));
    else if (action==='close-overlay'){ state.overlay=null; render(); }
    else if (action==='back-to-pick'){ state.overlay.step='pick'; render(); }
    else if (action==='pick-winner') pickWinner(el.getAttribute('data-side'));
    else if (action==='save-score') doSaveScore();
    else if (action==='reset-tap'){
      state.resetArmed = true; render();
      setTimeout(function(){ if (state.resetArmed){ state.resetArmed=false; render(); } }, 4000);
    }
    else if (action==='reset-confirm') doReset();
  });

  /* ============ INIT ============ */
  loadState().then(function(loaded){
    if (loaded && loaded.setupDone){
      state = loaded;
      state.overlay = null;
      state.resetArmed = false;
    }
    render();
  });
})();
</script>
</body>
</html>
